<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuckDuckGo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .logo-wrap img {
            width: 64px;
            height: 64px;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #de5833;
        }

        .search-form {
            display: flex;
            width: 560px;
            max-width: 90vw;
        }

        .search-input {
            flex: 1;
            padding: 14px 20px;
            font-size: 16px;
            border: none;
            border-radius: 28px 0 0 28px;
            background: #2b2b40;
            color: #fff;
            outline: none;
            caret-color: #de5833;
        }

        .search-input::placeholder {
            color: #888;
        }

        .search-btn {
            padding: 14px 22px;
            background: #de5833;
            border: none;
            border-radius: 0 28px 28px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .search-btn:hover { background: #c44b2a; }

        .search-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .tagline {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="logo-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
            <circle cx="32" cy="32" r="32" fill="#de5833"/>
            <circle cx="32" cy="28" r="14" fill="#fff"/>
            <circle cx="37" cy="24" r="5" fill="#1a1a2e"/>
            <circle cx="39" cy="23" r="2" fill="#fff"/>
            <ellipse cx="32" cy="50" rx="12" ry="8" fill="#fff"/>
        </svg>
        <div class="logo-text">Duck<span>Duck</span>Go</div>
    </div>

    <form class="search-form" id="searchForm">
        <input
            class="search-input"
            type="text"
            id="searchInput"
            placeholder="Search the web privately"
            autofocus
            autocomplete="off"
        />
        <button class="search-btn" type="submit">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M21.53 20.47l-4.8-4.8A8.5 8.5 0 1 0 15.2 17.2l4.8 4.8a.75.75 0 0 0 1.06-1.06zM4 10.5a6.5 6.5 0 1 1 13 0 6.5 6.5 0 0 1-13 0z"/>
            </svg>
        </button>
    </form>

    <p class="tagline">The search engine that doesn't track you.</p>

    <script>
        document.getElementById('searchForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            window.open('https://duckduckgo.com/?q=' + encodeURIComponent(query), '_blank');
        });
    </script>
</body>
</html>
